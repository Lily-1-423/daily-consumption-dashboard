<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运营消耗看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#f5f6fa; --card:#fff; --primary:#4f6ef7; --primary-light:#eef1ff; --success:#34c759; --warning:#ff9500; --danger:#ff3b30; --text:#1d1d1f; --text2:#86868b; --text3:#aeaeb2; --border:#e5e5ea; --radius:12px; --shadow:0 2px 12px rgba(0,0,0,0.06); --sidebar-bg:#1c1c1e; --sidebar-hover:#2c2c2e; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); }
.app { display:flex; min-height:100vh; }
.sidebar { width:240px; background:var(--sidebar-bg); color:#fff; padding:20px 0; flex-shrink:0; }
.sidebar h2 { padding:0 20px 20px; font-size:16px; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:12px; }
.sidebar .nav-section { padding:8px 20px 4px; font-size:11px; font-weight:600; color:rgba(255,255,255,0.35); text-transform:uppercase; letter-spacing:0.5px; }
.sidebar .nav-item { padding:10px 20px; cursor:pointer; font-size:14px; color:rgba(255,255,255,0.7); display:flex; align-items:center; gap:10px; transition:all .15s; position:relative; margin:1px 8px; border-radius:8px; }
.sidebar .nav-item:hover { background:rgba(255,255,255,0.08); }
.sidebar .nav-item.active { background:var(--primary); color:#fff; font-weight:600; }
.sidebar .nav-item .nav-dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:0.5; flex-shrink:0; }
.sidebar .nav-item.active .nav-dot { opacity:1; }
.main { flex:1; padding:28px 32px; overflow-y:auto; }
.header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
.header h1 { font-size:22px; font-weight:600; }
.header-controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.header-controls select { padding:6px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:#fff; cursor:pointer; min-width:120px; }
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
.stat-card { background:var(--card); border-radius:var(--radius); padding:20px 24px; box-shadow:var(--shadow); border:1px solid var(--border); }
.stat-card .label { font-size:13px; color:var(--text2); margin-bottom:4px; }
.stat-card .value { font-size:28px; font-weight:700; letter-spacing:-0.5px; }
.stat-card .sub { font-size:12px; color:var(--text2); margin-top:2px; }
.target-section { margin-bottom:20px; background:var(--card); border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border:1px solid var(--border); }
.target-section h3 { font-size:15px; font-weight:600; margin-bottom:14px; }
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px; }
.chart-box { background:var(--card); border-radius:var(--radius); padding:24px; border:1px solid var(--border); box-shadow:var(--shadow); }
.chart-box.full { grid-column:1/-1; }
.chart-box h3 { font-size:15px; font-weight:600; margin-bottom:14px; }
.chart-box canvas { max-height:320px; }
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th { background:var(--bg); text-align:left; padding:10px 14px; font-weight:600; color:var(--text2); border-bottom:1.5px solid var(--border); white-space:nowrap; }
.data-table td { padding:9px 14px; border-bottom:1px solid var(--border); }
.data-table tr:hover { background:var(--primary-light); }
.data-table .up { color:var(--danger); }
.data-table .down { color:var(--success); }
.anomaly { padding:24px; background:var(--card); border-radius:var(--radius); margin-bottom:24px; border:1px solid var(--border); box-shadow:var(--shadow); }
.anomaly h3 { font-size:15px; font-weight:600; margin-bottom:12px; }
@media (max-width:900px) {
  .app { flex-direction:column; }
  .sidebar { width:100%; padding:12px 0; display:flex; flex-wrap:wrap; }
  .sidebar h2 { width:100%; padding:0 16px 12px; }
  .sidebar .nav-item { padding:8px 16px; }
  .stats { grid-template-columns:repeat(2,1fr); }
  .chart-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <h2>&#x1F4CA; 运营看板</h2>
    <div id="sidebarItems"></div>
  </div>
  <div class="main" id="main">
    <div class="header">
      <h1 id="groupTitle">王孟组 · 运营看板</h1>
      <div class="header-controls">
        <select id="filterOperator" onchange="applyFilters()"><option value="">全部运营人员</option></select>
        <select id="filterMedia" onchange="applyFilters()"><option value="">全部媒体</option></select>
      </div>
    </div>
    <div class="stats" id="statsRow"></div>
    
    <div id="groupLeaderSection" class="target-section"><h3 id="groupLeaderTitle">组长目标及消耗</h3><div id="groupLeaderContent"></div></div><div id="targetSection" class="target-section"><h3>运营目标及达成情况</h3><table class="data-table" id="targetTable"><thead><tr><th>运营人员</th><th>目标消耗</th><th>实际消耗</th><th>达成率</th><th>进度</th></tr></thead></table></div>
    <div class="chart-grid">
      <div class="chart-box operator-chart-box"><h3>运营人员消耗</h3><canvas id="chartOperator"></canvas></div>
      <div class="chart-box media-chart-box"><h3>媒体消耗分布</h3><table class="data-table" id="mediaTable"><thead><tr><th>排名</th><th>媒体</th><th>消耗</th><th>占比</th></tr></thead></table></div>
      <div class="chart-box client-chart-box"><h3>客户消耗 Top10</h3><table class="data-table" id="clientTable"><thead><tr><th>排名</th><th>客户</th><th>消耗</th><th>占比</th></tr></thead></table></div>
      <div class="chart-box"><h3>近5日消耗趋势</h3><canvas id="chartDaily"></canvas></div>
    </div>
    <div class="anomaly" id="anomalySection"><h3>&#x1F514; 媒体异动 · 近5日上升/下降 Top5</h3><div id="anomalyTables"></div></div>
  </div>
</div>
<script src="数据.js"></script>
<script>
function sum(arr) { return arr.reduce(function(a,b){return a+b;}, 0); }
function groupBy(arr, key) {
  var m = new Map();
  arr.forEach(function(o){ var k = o[key]; if (!m.has(k)) m.set(k, []); m.get(k).push(o); });
  return m;
}
var charts = {};
var currentGroup = '王孟';

function getGroupData(group) {
  var data = RAW_DATA.filter(function(r){ return r.盟效运营组 === group && r.账户操作人 !== '/'; });
  var op = document.getElementById('filterOperator').value;
  var md = document.getElementById('filterMedia').value;
  if (op) data = data.filter(function(r){ return r.账户操作人 === op; });
  if (md) data = data.filter(function(r){ return r.媒体 === md; });
  return data;
}

function switchGroup(group) {
  currentGroup = group;
  var items = document.querySelectorAll('.nav-item');
  for (var i = 0; i < items.length; i++) {
    items[i].classList.toggle('active', items[i].dataset.group === group);
  }
  document.getElementById('groupTitle').textContent = group + '组 · 运营看板';
  updateFilters();
  applyFilters();
}

function updateFilters() {
  var data = RAW_DATA.filter(function(r){ return r.盟效运营组 === currentGroup && r.账户操作人 !== '/'; });
  var ops = [];
  var seen = new Set();
  data.forEach(function(r){ if (!seen.has(r.账户操作人)) { seen.add(r.账户操作人); ops.push(r.账户操作人); } });
  ops.sort();
  var meds = [];
  seen = new Set();
  data.forEach(function(r){ if (!seen.has(r.媒体)) { seen.add(r.媒体); meds.push(r.媒体); } });
  meds.sort();
  var selOp = document.getElementById('filterOperator');
  var selMd = document.getElementById('filterMedia');
  var curOp = selOp.value;
  var curMd = selMd.value;
  var opHtml = '<option value="">全部运营人员</option>';
  for (var i = 0; i < ops.length; i++) { opHtml += '<option value="' + ops[i] + '">' + ops[i] + '</option>'; }
  selOp.innerHTML = opHtml;
  var mdHtml = '<option value="">全部媒体</option>';
  for (var i = 0; i < meds.length; i++) { mdHtml += '<option value="' + meds[i] + '">' + meds[i] + '</option>'; }
  selMd.innerHTML = mdHtml;
  selOp.value = curOp;
  selMd.value = curMd;
}

function applyFilters() {
  var data = getGroupData(currentGroup);
  var opFilter = document.getElementById('filterOperator').value;
  adjustLayoutForFilter(data, opFilter);
  renderStats(data);
  renderOperatorChart(data);
  renderMediaTable(data);
  renderClientTable(data);
  renderDailyTrend(data);
  renderTargets(data);
  renderMediaAnomalies(data);
  renderGroupLeaderStats(data);
}

function adjustLayoutForFilter(data, opFilter) {
  var opChart = document.querySelector('.operator-chart-box');
  var firstStat = document.querySelector('.stat-card:first-child');
  if (!opChart || !firstStat) return;
  if (opFilter) {
    opChart.style.display = 'none';
    firstStat.querySelector('.label').textContent = opFilter;
    firstStat.querySelector('.sub').textContent = '运营人员';
  } else {
    opChart.style.display = '';
    firstStat.querySelector('.label').textContent = '总消耗';
    firstStat.querySelector('.sub').textContent = '总计';
  }
}

function renderStats(data) {
  var totalConsumption = sum(data.map(function(r){ return r.消耗; }));
  var operators = new Set(data.map(function(r){ return r.账户操作人; })).size;
  var media = new Set(data.map(function(r){ return r.媒体; })).size;
  var clients = new Set(data.map(function(r){ return r.客户; })).size;
  var cards = [
    { label:'总消耗', value:Math.round(totalConsumption).toLocaleString('zh-CN'), sub:'总计' },
    { label:'运营人员', value:operators, sub:'人' },
    { label:'媒体数', value:media, sub:'个' },
    { label:'客户数', value:clients, sub:'个' }
  ];
  var html = '';
  for (var i = 0; i < cards.length; i++) {
    html += '<div class="stat-card"><div class="label">' + cards[i].label + '</div><div class="value">' + cards[i].value + '</div><div class="sub">' + cards[i].sub + '</div></div>';
  }
  document.getElementById('statsRow').innerHTML = html;
  var opFilter = document.getElementById('filterOperator').value;
  if (opFilter) {
    var firstStat = document.querySelector('.stat-card:first-child');
    if (firstStat) { firstStat.querySelector('.label').textContent = opFilter; firstStat.querySelector('.sub').textContent = '运营人员'; }
  }
}

function renderOperatorChart(data) {
  var grouped = groupBy(data, '账户操作人');
  var labels = [];
  var values = [];
  var keys = [];
  grouped.forEach(function(v, k){ keys.push(k); });
  keys.sort();
  for (var i = 0; i < keys.length; i++) {
    labels.push(keys[i]);
    values.push(sum(grouped.get(keys[i]).map(function(r){ return r.消耗; })));
  }
  var colors = ['#4f6ef7','#34c759','#ff9500','#ff3b30','#af52de','#5ac8fa','#ff2d55'];
  destroyChart('chartOperator');
  charts.chartOperator = new Chart(document.getElementById('chartOperator'), {
    type:'line',
    data:{ labels:labels, datasets:[{
      label:'消耗', data:values,
      borderColor:'#4f6ef7', backgroundColor:'rgba(79,110,247,0.1)',
      fill:true, tension:0.3, pointRadius:4, pointBackgroundColor:'#4f6ef7', borderWidth:2
    }]},
    options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:false } },
     scales:{ y:{ beginAtZero:true, ticks:{ callback:function(v){ return v.toLocaleString(); } } } } }
  });
}

function renderMediaTable(data) {
  var grouped = groupBy(data, '媒体');
  var total = sum(data.map(function(r){ return r.消耗; }));
  var entries = [];
  grouped.forEach(function(v, k){ entries.push({ name:k, value:sum(v.map(function(r){ return r.消耗; })) }); });
  entries.sort(function(a,b){ return b.value - a.value; });
  var maxVal = entries.length > 0 ? entries[0].value : 0;
  var html = '<tr><th>排名</th><th>媒体</th><th>消耗</th><th>占比</th></tr>';
  for (var i = 0; i < entries.length; i++) {
    var pct = total > 0 ? Math.round(entries[i].value / total * 100) : 0;
    var barW = maxVal > 0 ? (entries[i].value / maxVal * 100) : 0;
    html += '<tr><td>' + (i+1) + '</td><td>' + entries[i].name + '</td><td>' + Math.round(entries[i].value).toLocaleString('zh-CN') + '</td><td>' + pct + '% <div style="background:#e8e8e8;border-radius:4px;height:6px;margin-top:4px;"><div style="background:#4f6ef7;height:6px;border-radius:4px;width:' + barW + '%;"></div></div></td></tr>';
  }
  document.getElementById('mediaTable').innerHTML = html;
}

function renderClientTable(data) {
  var grouped = groupBy(data, '客户');
  var total = sum(data.map(function(r){ return r.消耗; }));
  var entries = [];
  grouped.forEach(function(v, k){ entries.push({ name:k, value:sum(v.map(function(r){ return r.消耗; })) }); });
  entries.sort(function(a,b){ return b.value - a.value; });
  entries = entries.slice(0, 10);
  var maxVal = entries.length > 0 ? entries[0].value : 0;
  var html = '<tr><th>排名</th><th>客户</th><th>消耗</th><th>占比</th></tr>';
  for (var i = 0; i < entries.length; i++) {
    var pct = total > 0 ? Math.round(entries[i].value / total * 100) : 0;
    var barW = maxVal > 0 ? (entries[i].value / maxVal * 100) : 0;
    html += '<tr><td>' + (i+1) + '</td><td>' + entries[i].name + '</td><td>' + Math.round(entries[i].value).toLocaleString('zh-CN') + '</td><td>' + pct + '% <div style="background:#e8e8e8;border-radius:4px;height:6px;margin-top:4px;"><div style="background:#af52de;height:6px;border-radius:4px;width:' + barW + '%;"></div></div></td></tr>';
  }
  document.getElementById('clientTable').innerHTML = html;
}

function renderDailyTrend(data) {
  var allDates = [];
  var seen = new Set();
  RAW_DATA.filter(function(r){ return r.盟效运营组 === currentGroup; }).forEach(function(r){
    if (!seen.has(r.日期)) { seen.add(r.日期); allDates.push(r.日期); }
  });
  allDates.sort();
  var dates = allDates.slice(-5);
  var grouped = groupBy(data, '日期');
  var values = [];
  for (var i = 0; i < dates.length; i++) {
    var items = grouped.get(dates[i]);
    values.push(items ? sum(items.map(function(r){ return r.消耗; })) : 0);
  }
  destroyChart('chartDaily');
  charts.chartDaily = new Chart(document.getElementById('chartDaily'), {
    type:'line',
    data:{ labels:dates, datasets:[{
      label:'消耗', data:values, borderColor:'#4f6ef7', backgroundColor:'rgba(79,110,247,0.1)',
      fill:true, tension:0.3, pointRadius:4, pointBackgroundColor:'#4f6ef7'
    }]},
    options:{ responsive:true, maintainAspectRatio:true, plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true, ticks:{ callback:function(v){ return v.toLocaleString(); } } } },
      animation:{ duration:500 } }
  });
}

function renderMediaAnomalies(data) {
  var allDates = [];
  var seen = new Set();
  RAW_DATA.filter(function(r){ return r.盟效运营组 === currentGroup; }).forEach(function(r){
    if (!seen.has(r.日期)) { seen.add(r.日期); allDates.push(r.日期); }
  });
  allDates.sort();
  var dates = allDates.slice(-5);
  if (dates.length < 2) {
    document.getElementById('anomalyTables').innerHTML = '<p style="color:#999;">暂无足够数据</p>';
    return;
  }
  var mediaDaily = {};
  var grouped = groupBy(data, '媒体');
  grouped.forEach(function(items, media){
    var byDate = groupBy(items, '日期');
    mediaDaily[media] = {};
    for (var i = 0; i < dates.length; i++) {
      var d = dates[i];
      var it = byDate.get(d);
      mediaDaily[media][d] = it ? sum(it.map(function(r){ return r.消耗; })) : 0;
    }
  });
  var changes = [];
  Object.keys(mediaDaily).forEach(function(media){
    var daily = mediaDaily[media];
    for (var i = 1; i < dates.length; i++) {
      var prev = daily[dates[i-1]] || 0;
      var curr = daily[dates[i]] || 0;
      var pct = prev > 0 ? ((curr - prev) / prev * 100) : (curr > 0 ? 100 : 0);
      changes.push({ media:media, date:dates[i], prev:prev, curr:curr, pct:pct });
    }
  });
  if (changes.length === 0) {
    document.getElementById('anomalyTables').innerHTML = '<p style="color:#999;">暂无足够数据</p>';
    return;
  }
  changes.sort(function(a,b){ return b.pct - a.pct; });
  var top5Rise = changes.slice(0, 5);
  var top5Fall = changes.slice(-5).reverse();
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">';
  html += '<div><h4 style="margin-bottom:8px;color:#ff3b30;">&#x1F4C8; 上升 Top5</h4><table class="data-table"><tr><th>媒体</th><th>日期</th><th>前日消耗</th><th>当日消耗</th><th>日环比</th></tr>';
  for (var i = 0; i < top5Rise.length; i++) {
    var c = top5Rise[i];
    html += '<tr><td>' + c.media + '</td><td>' + c.date + '</td><td>' + Math.round(c.prev).toLocaleString('zh-CN') + '</td><td>' + Math.round(c.curr).toLocaleString('zh-CN') + '</td><td class="up">+' + Math.round(c.pct) + '%</td></tr>';
  }
  html += '</table></div>';
  html += '<div><h4 style="margin-bottom:8px;color:#34c759;">&#x1F4C9; 下降 Top5</h4><table class="data-table"><tr><th>媒体</th><th>日期</th><th>前日消耗</th><th>当日消耗</th><th>日环比</th></tr>';
  for (var i = 0; i < top5Fall.length; i++) {
    var c = top5Fall[i];
    html += '<tr><td>' + c.media + '</td><td>' + c.date + '</td><td>' + Math.round(c.prev).toLocaleString('zh-CN') + '</td><td>' + Math.round(c.curr).toLocaleString('zh-CN') + '</td><td class="down">' + Math.round(c.pct) + '%</td></tr>';
  }
  html += '</table></div></div>';
  document.getElementById('anomalyTables').innerHTML = html;
}

function renderTargets(data) {
  var defaultTargets = {
    "余锐":1500000,"张远祥":1500000,"夏玲欢":2100000,"邱芬":2100000,"魏达昌":2100000,"张琪":2100000,"李沙":2100000,"陈安琦":2100000,
    "任洁":2100000,"敖丽":1050000,"王曼":1050000,"刘云杰":4500000,"董崇阳":1800000,"章晓东":1800000,"李露露":1800000,
    "陈瑶瑶":900000,"鲁伊雯":1500000,"孟杨":1500000,"项任娸":1500000,"刘秋芬":1500000,"杨玉洁":750000,"陈佳":750000,"薛岭":750000
  };
  var groupOps = [];
  var seen = new Set();
  RAW_DATA.filter(function(r){ return r.盟效运营组 === currentGroup && r.账户操作人 !== '/'; }).forEach(function(r){
    if (!seen.has(r.账户操作人)) { seen.add(r.账户操作人); groupOps.push(r.账户操作人); }
  });
  var entries = [];
  for (var i = 0; i < groupOps.length; i++) {
    var k = groupOps[i];
    var opData = data.filter(function(r){ return r.账户操作人 === k; });
    var total = opData.length > 0 ? sum(opData.map(function(r){ return r.消耗; })) : 0;
    var target = defaultTargets[k] || 0;
    var rate = target > 0 ? (total / target * 100) : 0;
    entries.push({ name:k, total:total, target:target, rate:rate });
  }
  var opFilter = document.getElementById('filterOperator').value;
  var sectionTitle = document.querySelector('#targetSection h3');
  if (opFilter) {
    entries = entries.filter(function(e){ return e.name === opFilter; });
    sectionTitle.textContent = opFilter + ' · 目标及达成';
  } else {
    sectionTitle.textContent = '运营目标及达成情况';
  }
  entries.sort(function(a,b){ return b.total - a.total; });
  var html = '<tr><th>运营人员</th><th>目标消耗</th><th>实际消耗</th><th>达成率</th><th>进度</th></tr>';
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    var pct = Math.round(e.rate);
    var barColor = e.rate >= 100 ? '#34c759' : e.rate >= 50 ? '#ff9500' : '#ff3b30';
    html += '<tr><td>' + e.name + '</td><td>' + Math.round(e.target).toLocaleString('zh-CN') + '</td><td>' + Math.round(e.total).toLocaleString('zh-CN') + '</td><td>' + pct + '%</td><td><div style="background:#e8e8e8;border-radius:4px;height:8px;width:120px;display:inline-block;vertical-align:middle;"><div style="background:' + barColor + ';height:8px;border-radius:4px;width:' + Math.min(100, e.rate) + '%;"></div></div></td></tr>';
  }
  document.querySelector('#targetTable').innerHTML = html;
}

function buildSidebar() {
  var groups = [];
  var seen = new Set();
  RAW_DATA.forEach(function(r){
    var g = r.盟效运营组;
    if (g && g !== '/' && !seen.has(g)) { seen.add(g); groups.push(g); }
  });
  groups.sort();
  var html = '<div class="nav-section">运营组</div>';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var active = g === currentGroup ? ' active' : '';
    html += '<div class="nav-item' + active + '" data-group="' + g + '" onclick="switchGroup(\'' + g + '\')"><span class="nav-dot"></span>' + g + '组</div>';
  }
  document.getElementById('sidebarItems').innerHTML = html;
}

function initDashboard() {
  buildSidebar();
  if (!currentGroup) {
    var groups = [];
    var seen = new Set();
    RAW_DATA.forEach(function(r){
      var g = r.盟效运营组;
      if (g && g !== '/' && !seen.has(g)) { seen.add(g); groups.push(g); }
    });
    groups.sort();
    currentGroup = groups[0] || '王孟';
  }
  document.getElementById('groupTitle').textContent = currentGroup + '组 · 运营看板';
  updateFilters();
  applyFilters();
}



function renderGroupLeaderStats(data) {
  var section = document.getElementById('groupLeaderSection');
  var opFilter = document.getElementById('filterOperator').value;
  var mdFilter = document.getElementById('filterMedia').value;
  if (opFilter || mdFilter) { section.style.display = 'none'; return; }
  section.style.display = '';
  var groupLeaderTargets = {'钱世豪':70000,'王孟':60000,'刘静':50000,'张远祥':50000};
  var target = groupLeaderTargets[currentGroup] || 0;
  var groupOps = [];
  var seen = new Set();
  RAW_DATA.filter(function(r){ return r.盟效运营组 === currentGroup && r.账户操作人 !== '/'; }).forEach(function(r){
    if (!seen.has(r.账户操作人)) { seen.add(r.账户操作人); groupOps.push(r.账户操作人); }
  });
  var opCount = groupOps.length;
  var totalGroupConsumption = 0;
  var currentMonth = '2026-06';
  RAW_DATA.filter(function(r){ return r.盟效运营组 === currentGroup && r.日期.indexOf(currentMonth) === 0; }).forEach(function(r){
    totalGroupConsumption += Number(r.消耗);
  });
  var daysInMonth = 30;
  var actualPPPD = opCount > 0 ? Math.round(totalGroupConsumption / opCount / daysInMonth) : 0;
  var rate = target > 0 ? Math.round(actualPPPD / target * 100) : 0;
  var h = '';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;">';
  h += '<div class="stat-card"><div class="label">组长目标</div><div class="value">' + (target/10000).toFixed(1) + '万</div><div class="sub">' + currentGroup + '组·每人/天</div></div>';
  h += '<div class="stat-card"><div class="label">组长实际消耗</div><div class="value">' + (actualPPPD/10000).toFixed(1) + '万</div><div class="sub">' + currentGroup + '组·每人/天</div></div>';
  h += '<div class="stat-card"><div class="label">达成率</div><div class="value">' + rate + '%</div><div class="sub">目标 vs 实际</div></div></div>';
  document.getElementById('groupLeaderContent').innerHTML = h;
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

initDashboard();
</script>
